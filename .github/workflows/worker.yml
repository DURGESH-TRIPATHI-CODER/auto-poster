name: autoposter-worker

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:
    inputs:
      force:
        description: "Force publish all pending posts now"
        required: false
        default: "false"

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
      LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
      X_EMAIL: ${{ secrets.X_EMAIL }}
      X_PASSWORD: ${{ secrets.X_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      REMINDER_EMAIL: ${{ secrets.REMINDER_EMAIL }}
      WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
      WORKER_TIMEZONE: "Asia/Calcutta"
      CI: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Restore sessions
        run: |
          mkdir -p .sessions
          echo "${{ secrets.LINKEDIN_SESSION }}" | base64 -d > .sessions/linkedin.json
          echo "${{ secrets.TWITTER_SESSION }}" | base64 -d > .sessions/twitter.json

      - name: Run worker (force)
        if: ${{ github.event.inputs.force == 'true' }}
        run: npx tsx scripts/worker.ts --now

      - name: Run worker (scheduled)
        if: ${{ github.event.inputs.force != 'true' }}
        run: npx tsx scripts/worker.ts --once
